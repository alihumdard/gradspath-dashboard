async function render(key){
  const el=document.getElementById('erd');
  el.innerHTML='<div style="padding:20px;color:var(--color-text-secondary);font-size:13px">Rendering…</div>';
  try{
    const id='erd-'+key+'-'+Date.now();
    const {svg}=await mermaid.render(id,D[key]);
    el.innerHTML=svg;
    styleEntities(el);
  }catch(e){
    el.innerHTML='<div style="padding:16px;color:var(--color-text-danger);font-size:12px">'+e.message+'</div>';
  }
}

function styleEntities(container){
  container.querySelectorAll('svg .node').forEach(node=>{
    const fp=node.querySelector('path[d]');
    if(!fp)return;
    const nums=(fp.getAttribute('d').match(/-?[\d.]+/g)||[]).map(Number);
    if(nums.length<4)return;
    const xs=nums.filter((_,i)=>i%2===0),ys=nums.filter((_,i)=>i%2===1);
    const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
    ['fill','stroke','stroke-width','class','style'].forEach(a=>{if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));});
    fp.replaceWith(r);
  });
  container.querySelectorAll('svg .row-rect-odd path,svg .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
}

window.show=function(key){
  document.querySelectorAll('.tab').forEach(t=>{
    const map={auth:'auth',institutions:'inst',officehours:'office',bookings:'book',finance:'pay',content:'content',admin:'admin'};
    const labels={auth:'Auth',institutions:'Inst',officehours:'Office',bookings:'Book',finance:'Pay',content:'Content',admin:'Admin'};
    t.classList.toggle('active',t.textContent.toLowerCase().includes(labels[key]?.toLowerCase()||key));
  });
  render(key);
};
