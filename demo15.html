<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support - Grads Paths</title>
    <link rel="stylesheet" href="demo1.css" /> 
    <link rel="stylesheet" href="demo15.css" />
  </head>
  <body data-theme="light">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <div class="brand-icon">GP</div>
            <div class="brand-copy">
              <div class="brand-title">Grads Paths</div>
              <div class="brand-subtitle">STUDENT PORTAL</div>
            </div>
          </div>
          <a href="demo1.html" class="back-link">
            <span>←</span> <span>Back to Dashboard</span>
          </a>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-group">
            <a href="demo1.html" class="nav-item single-link">
              <span class="nav-text">Find Mentors</span>
            </a>
          </div>
          <div class="nav-group">
            <a href="demo15.html" class="nav-item single-link active">
              <span class="nav-text">Support</span>
            </a>
          </div>
        </nav>
      </aside>

      <main class="main-content">
        <div class="support-wrapper">
          <div class="feedback-card">
            <h2>Submit Feedback</h2>
            <p>Create a support ticket or give us feedback about how we can make your experience even better!</p>
            
            <form action="#">
              <div class="form-field">
                <label>NAME</label>
                <input type="text" placeholder="e.g. Mike Ross" />
              </div>
              
              <div class="form-field">
                <label>EMAIL</label>
                <input type="email" placeholder="you@university.edu" />
              </div>
              
              <div class="form-field">
                <label>SUBJECT</label>
                <input type="text" placeholder="e.g. Issue with...." />
              </div>
              
              <div class="form-field">
                <label>MESSAGE</label>
                <textarea rows="4" placeholder="Type your message here..."></textarea>
              </div>
              
              <button type="submit" class="send-message-btn">Send message</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
